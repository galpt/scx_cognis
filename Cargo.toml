[package]
name = "scx_cognis"
version = "1.3.10"
authors = ["scx_cognis contributors"]
edition = "2021"
description = "An attempt to make an intelligent CPU scheduler — AI-driven, sched_ext-based, user-space Linux CPU scheduler"
license = "GPL-2.0-only"
repository = "https://github.com/galpt/scx_cognis"

[dependencies]
anyhow      = "1.0"
clap        = { version = "4.5", features = ["derive", "env", "unicode", "wrap_help"] }
ctrlc       = { version = "3.1", features = ["termination"] }
libbpf-rs   = "=0.26.0-beta.1"
libc        = "0.2"
log         = "0.4"
plain       = "0.2"
procfs      = "0.18"
serde       = { version = "1.0", features = ["derive"] }
simplelog   = "0.12"

# scx ecosystem (published to crates.io)
scx_stats         = "1.0.22"
scx_stats_derive  = "1.0.21"
scx_utils         = "1.0.26"
scx_rustland_core = "2.4.10"

# TUI
crossterm = "0.27"
ratatui   = "0.26"

[build-dependencies]
scx_cargo         = "1.0.27"

[features]
enable_backtrace = []

# Suppress lints that originate in the BPF skeleton generated by libbpf-cargo.
# Per-file #[allow] attributes cannot be committed durably on generated files,
# so we use crate-level suppression via [lints.clippy] instead.
[lints.clippy]
too_many_arguments = "allow"
useless_asref      = "allow"
