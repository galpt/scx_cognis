name: CI (Ubuntu)

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────────────────
# Lint → Test → Build compile-check on Ubuntu 24.04.
# Triggered on pull requests, manual dispatch, or called by release.yml.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint: format check
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ──────────────────────────────────────────────────────────────────────────
  # Test: run all unit tests (no kernel or root required)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-24.04
    needs: [ lint ]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libclang-dev \
            libbpf-dev libelf-dev zlib1g-dev \
            libseccomp-dev \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Update scx_rustland_core to latest compatible version
        run: cargo update -p scx_rustland_core

      - name: cargo test
        run: cargo test --all -- --nocapture

  # ──────────────────────────────────────────────────────────────────────────
  # Build: compile-check release binary (no artifact upload)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-24.04
    needs: [ test ]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libclang-dev \
            libbpf-dev libelf-dev zlib1g-dev \
            libseccomp-dev \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Update scx_rustland_core to latest compatible version
        run: cargo update -p scx_rustland_core

      - name: cargo build --release
        run: cargo build --release
