name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to increment'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # CI: lint + test on Ubuntu (must pass before release builds)
  # ──────────────────────────────────────────────────────────────────────────
  ci-ubuntu:
    name: CI — Ubuntu lint + test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libclang-dev \
            libbpf-dev libelf-dev zlib1g-dev \
            libseccomp-dev pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo test
        run: cargo test --all -- --nocapture

  # ──────────────────────────────────────────────────────────────────────────
  # CI: compile-check on Arch Linux
  # ──────────────────────────────────────────────────────────────────────────
  ci-arch:
    name: CI — Arch Linux compile check
    runs-on: ubuntu-24.04
    container:
      image: archlinux/archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            git base-devel clang llvm libbpf libelf libseccomp pkg-config curl

      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        run: cargo check --all

  # ──────────────────────────────────────────────────────────────────────────
  # CI: compile-check on CachyOS
  # ──────────────────────────────────────────────────────────────────────────
  ci-cachyos:
    name: CI — CachyOS compile check
    runs-on: ubuntu-24.04
    container:
      image: cachyos/cachyos:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            git base-devel clang llvm libbpf libelf libseccomp pkg-config curl

      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        run: cargo check --all

  # ──────────────────────────────────────────────────────────────────────────
  # Release: build, tag, and publish (only if all CI jobs pass)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    needs: [ci-ubuntu, ci-arch, ci-cachyos]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version from latest tag
        id: compute_version
        run: |
          # Fetch all tags so we can find the latest release
          git fetch --tags --quiet

          # Find the highest vX.Y.Z tag; default to v0.0.0 if none exist
          LATEST=$(git tag --list 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)
          LATEST="${LATEST:-v0.0.0}"
          echo "Latest tag: $LATEST"

          # Strip leading 'v' and split
          BASE="${LATEST#v}"
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          # Increment the requested component
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libclang-dev \
            libbpf-dev libelf-dev zlib1g-dev \
            libseccomp-dev pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Patch Cargo.toml version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.compute_version.outputs.new_version }}\"/" Cargo.toml
          grep '^version' Cargo.toml

      - name: cargo build --release
        run: cargo build --release

      - name: Package release archive
        run: |
          mkdir -p release
          cp target/release/scx_cognis release/scx_cognis
          chmod +x release/scx_cognis
          cd release
          tar -czf scx_cognis-linux-x86_64.tar.gz scx_cognis
          sha256sum scx_cognis-linux-x86_64.tar.gz > scx_cognis-linux-x86_64.tar.gz.sha256

      - name: Create and push git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.compute_version.outputs.new_version }}"
          git push origin "v${{ steps.compute_version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.compute_version.outputs.new_version }}
          name: v${{ steps.compute_version.outputs.new_version }}
          files: |
            release/scx_cognis-linux-x86_64.tar.gz
            release/scx_cognis-linux-x86_64.tar.gz.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
