name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to increment'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Compute next version from Cargo.toml (the authoritative version source)
  # ──────────────────────────────────────────────────────────────────────────
  compute-version:
    name: Compute next version
    runs-on: ubuntu-24.04
    outputs:
      new_version: ${{ steps.tag.outputs.new_version }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute next version from Cargo.toml
        id: tag
        run: |
          # Read the authoritative version from Cargo.toml so the computed
          # next version is always exactly one increment ahead of what is
          # already in the file — regardless of what git tags exist.
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -ra PARTS <<< "$CURRENT"
          MAJOR=${PARTS[0]:-1}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          TIMESTAMP=$(date -u '+%Y%m%d%H%M%S')
          NEW_TAG="v${NEW}-${TIMESTAMP}"
          echo "Current version: $CURRENT  New version: $NEW  Tag: $NEW_TAG"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # CI: lint + test on Ubuntu (must pass before release builds)
  # ──────────────────────────────────────────────────────────────────────────
  ci-ubuntu:
    name: CI — Ubuntu lint + test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libclang-dev \
            libbpf-dev libelf-dev zlib1g-dev \
            libseccomp-dev pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo test
        run: cargo test --all -- --nocapture

  # ──────────────────────────────────────────────────────────────────────────
  # CI: compile-check on Arch Linux
  # ──────────────────────────────────────────────────────────────────────────
  ci-arch:
    name: CI — Arch Linux compile check
    runs-on: ubuntu-24.04
    container:
      image: archlinux/archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            git base-devel clang llvm libbpf libelf libseccomp pkg-config curl

      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        run: cargo check --all

  # ────────────────────────────────────────────────────────────────────────
  # CI: compile-check on CachyOS
  # ──────────────────────────────────────────────────────────────────────────
  ci-cachyos:
    name: CI — CachyOS compile check
    runs-on: ubuntu-24.04
    container:
      image: cachyos/cachyos:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            git base-devel clang llvm libbpf libelf libseccomp pkg-config curl

      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        run: cargo check --all

  # ────────────────────────────────────────────────────────────────────────
  # Release: build, tag, and publish (only if all CI jobs pass)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    needs: [compute-version, ci-ubuntu, ci-arch, ci-cachyos]
    permissions:
      contents: write
    # Override the repo-level .cargo/config.toml which redirects the build
    # output to /tmp/scx_cognis_build (a workaround for the space in the local
    # dev path). In CI the checkout path has no spaces, so we use the standard
    # ./target directory so that packaging steps can find the binary reliably.
    env:
      CARGO_TARGET_DIR: target
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libclang-dev \
            libbpf-dev libelf-dev zlib1g-dev \
            libseccomp-dev pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Patch and commit Cargo.toml version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ needs.compute-version.outputs.new_version }}\"/" Cargo.toml
          grep '^version' Cargo.toml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          if git diff --cached --quiet; then
            echo "Cargo.toml is already at ${{ needs.compute-version.outputs.new_version }} — skipping commit."
          else
            git commit -m "chore: bump version to ${{ needs.compute-version.outputs.new_version }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: cargo build --release
        run: cargo build --release

      - name: Package release archive
        run: |
          mkdir -p release
          cp target/release/scx_cognis release/scx_cognis
          chmod +x release/scx_cognis
          cd release
          tar -czf scx_cognis-linux-x86_64.tar.gz scx_cognis
          sha256sum scx_cognis-linux-x86_64.tar.gz > scx_cognis-linux-x86_64.tar.gz.sha256

      - name: Create and push git tag
        run: |
          git tag "${{ needs.compute-version.outputs.new_tag }}"
          git push origin "${{ needs.compute-version.outputs.new_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.compute-version.outputs.new_tag }}
          name: ${{ needs.compute-version.outputs.new_tag }}
          files: |
            release/scx_cognis-linux-x86_64.tar.gz
            release/scx_cognis-linux-x86_64.tar.gz.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
